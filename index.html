<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathClass</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- XLSX library for Excel import -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="splash">
        <div id="splash-logo-wrap">
            <img id="splash-logo" src="logo-blue.png" alt="MathClass">
            <div id="splash-glow"></div>
        </div>
        <div id="splash-title">MathClass</div>
        <div id="splash-sub">Interaktiv matematika platformasi</div>
    </div>
    <div class="toast" id="toast"></div>
    <div id="app">Yuklanmoqda...</div>

    <!-- Firebase SDK (modular v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateEmail, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, writeBatch, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTPbiVCm2uUg121AtubCzc-xnsp2ghhGo",
            authDomain: "mathclass-app.firebaseapp.com",
            projectId: "mathclass-app",
            storageBucket: "mathclass-app.firebasestorage.app",
            messagingSenderId: "296894162345",
            appId: "1:296894162345:web:9bbb4f2ca7a1088f0250b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        enableIndexedDbPersistence(db).catch(err => {
            if (err.code === 'failed-precondition') console.log('Multiple tabs open – persistence disabled');
        });

        window.app = app;
        window.auth = auth;
        window.db = db;
        window.collection = collection;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.getDocs = getDocs;
        window.query = query;
        window.where = where;
        window.writeBatch = writeBatch;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.updateEmail = updateEmail;
        window.updatePassword = updatePassword;
        window.reauthenticateWithCredential = reauthenticateWithCredential;
        window.EmailAuthProvider = EmailAuthProvider;

        console.log('✅ Firebase initialized');

        const scripts = ['db.js', 'auth.js', 'app.js', 'student.js', 'teacher.js'];
        function loadScripts(idx) {
            if (idx >= scripts.length) {
                if (typeof initApp === 'function') initApp();
                return;
            }
            const s = document.createElement('script');
            s.src = scripts[idx];
            s.onload = () => loadScripts(idx+1);
            s.onerror = () => {
                console.error('Failed to load', scripts[idx]);
                alert('Failed to load ' + scripts[idx]);
            };
            document.body.appendChild(s);
        }
        loadScripts(0);
    </script>
</body>
</html>
